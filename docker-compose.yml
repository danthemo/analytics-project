services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-market_ratings}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-market_ratings}"]
      interval: 10s
      timeout: 5s
      retries: 5

  analysis-service:
    build:
      context: ./analysis-service
    container_name: analysis-service
    restart: unless-stopped
    environment:
      APP_NAME: analysis-service
      APP_PORT: 8000
      MODEL_DIR: /app/artifacts/model
    ports:
      - "${ANALYSIS_SERVICE_PORT:-8000}:8000"
    volumes:
      - ./analysis-service/artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5

  rating-service:
    build:
      context: ./rating-service
    container_name: rating-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      analysis-service:
        condition: service_healthy
    environment:
      APP_NAME: rating-service
      HTTP_PORT: 8080
      ANALYSIS_SERVICE_URL: ${ANALYSIS_SERVICE_URL:-http://analysis-service:8000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-market_ratings}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_SSLMODE: disable
    ports:
      - "${RATING_SERVICE_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  ozon-parser:
    build:
      context: .
      dockerfile: python/Dockerfile
    container_name: ozon-parser
    restart: unless-stopped
    shm_size: "1gb"
    command: ["xvfb-run", "-a", "uvicorn", "main_ozon:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "${OZON_PARSER_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/openapi.json', timeout=5)"]
      interval: 20s
      timeout: 10s
      retries: 5

  yandex-market-parser:
    build:
      context: .
      dockerfile: python/Dockerfile
    container_name: yandex-market-parser
    restart: unless-stopped
    shm_size: "1gb"
    command: ["uvicorn", "ya_parse:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "${YANDEX_MARKET_PARSER_PORT:-8002}:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/openapi.json', timeout=5)"]
      interval: 20s
      timeout: 10s
      retries: 5

  collector-service:
    build:
      context: ./collector-service
    container_name: collector-service
    restart: unless-stopped
    depends_on:
      ozon-parser:
        condition: service_healthy
      yandex-market-parser:
        condition: service_healthy
    environment:
      APP_NAME: collector-service
      SERVER_PORT: 8080
      OZON_PARSER_URL: http://ozon-parser:8001/parse/ozon
      YANDEX_MARKET_PARSER_URL: http://yandex-market-parser:8002/parse/yandex-market
      SOURCE_TIMEOUT_SECONDS: ${SOURCE_TIMEOUT_SECONDS:-60}
    ports:
      - "${COLLECTOR_SERVICE_PORT:-8090}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
