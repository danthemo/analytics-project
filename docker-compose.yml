services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reviews_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-reviews_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-reviews_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${CATALOG_SERVICE_PORT:-8001}:8000"

  review-service:
    build:
      context: .
      dockerfile: review-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-reviews_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${REVIEW_SERVICE_PORT:-8002}:8000"

  analysis-service:
    build:
      context: .
      dockerfile: analysis-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      review-service:
        condition: service_started
    environment:
      APP_NAME: analysis-service
      APP_PORT: 8000
      MODEL_DIR: /app/artifacts/model
      REVIEW_SERVICE_URL: ${REVIEW_SERVICE_URL:-http://review-service:8000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-reviews_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-30}
    ports:
      - "${ANALYSIS_SERVICE_PORT:-8003}:8000"
    volumes:
      - ./analysis-service/artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5

  rating-service:
    build:
      context: .
      dockerfile: rating-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      analysis-service:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-reviews_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${RATING_SERVICE_PORT:-8004}:8000"

  ozon-parser:
    build:
      context: .
      dockerfile: python/Dockerfile
    restart: unless-stopped
    shm_size: "1gb"
    command: ["uvicorn", "main_ozon:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "${OZON_PARSER_PORT:-8006}:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/openapi.json', timeout=5)"]
      interval: 20s
      timeout: 10s
      retries: 5

  yandex-market-parser:
    build:
      context: .
      dockerfile: python/Dockerfile
    restart: unless-stopped
    shm_size: "1gb"
    command: ["uvicorn", "ya_parse:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "${YANDEX_MARKET_PARSER_PORT:-8007}:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/openapi.json', timeout=5)"]
      interval: 20s
      timeout: 10s
      retries: 5

  collector-service:
    build:
      context: .
      dockerfile: collector-service/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: collector-service
      APP_PORT: 8000
      OZON_PARSER_URL: ${OZON_PARSER_URL:-http://ozon-parser:8001/parse/ozon}
      YANDEX_MARKET_PARSER_URL: ${YANDEX_MARKET_PARSER_URL:-http://yandex-market-parser:8002/parse/yandex-market}
      COLLECTOR_REQUEST_TIMEOUT_SECONDS: ${COLLECTOR_REQUEST_TIMEOUT_SECONDS:-240}
    ports:
      - "${COLLECTOR_SERVICE_PORT:-8005}:8000"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      catalog-service:
        condition: service_started
      collector-service:
        condition: service_started
      review-service:
        condition: service_started
      analysis-service:
        condition: service_started
      rating-service:
        condition: service_started
    environment:
      APP_NAME: api-gateway
      APP_PORT: 8000
      CATALOG_SERVICE_URL: ${CATALOG_SERVICE_URL:-http://catalog-service:8000}
      COLLECTOR_SERVICE_URL: ${COLLECTOR_SERVICE_URL:-http://collector-service:8000}
      REVIEW_SERVICE_URL: ${REVIEW_SERVICE_URL:-http://review-service:8000}
      ANALYSIS_SERVICE_URL: ${ANALYSIS_SERVICE_URL:-http://analysis-service:8000}
      RATING_SERVICE_URL: ${RATING_SERVICE_URL:-http://rating-service:8000}
      API_GATEWAY_REQUEST_TIMEOUT_SECONDS: ${API_GATEWAY_REQUEST_TIMEOUT_SECONDS:-300}
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"

  frontend-service:
    build:
      context: .
      dockerfile: frontend-service/Dockerfile
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_started
    environment:
      VITE_USE_MOCK_API: ${VITE_USE_MOCK_API:-false}
      VITE_API_PREFIX: ${VITE_API_PREFIX:-/api}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://api-gateway:8000}
    ports:
      - "${FRONTEND_SERVICE_PORT:-5173}:5173"

volumes:
  postgres-data:
